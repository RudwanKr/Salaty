<main>
  <div class="logo">
    <img src="assets/images/logo.webp" alt="" />
  </div>

  <ul>
    @for(item of menuItems; track item.path) {
        <li 
        [routerLink]="item.path"
        routerLinkActive="active"
        >
        <i class="{{ item.icon }}"></i>
        <p>{{ item.label }}</p>
        </li>
    }
  </ul>

  <div class="flowers-scene">
    <svg viewBox="0 0 200 500" preserveAspectRatio="xMidYMax meet" class="flowers-svg" xmlns="http://www.w3.org/2000/svg">
      <!-- Left flower (Blue) -->
      <g class="flower blue">
        <path d="M100,500 Q70,300 20,120" stroke="#7DCEA0" stroke-width="4" fill="none" stroke-linecap="round" />
        <path d="M75,340 Q35,300 25,360 Q65,370 75,340" fill="#7DCEA0" />
        <g class="head" transform="translate(20,120) scale(1.8)">
          <circle cx="0" cy="-14" r="12" fill="#A9CCE3"/>
          <circle cx="13" cy="-4" r="12" fill="#A9CCE3"/>
          <circle cx="8" cy="11" r="12" fill="#A9CCE3"/>
          <circle cx="-8" cy="11" r="12" fill="#A9CCE3"/>
          <circle cx="-13" cy="-4" r="12" fill="#A9CCE3"/>
          <circle cx="0" cy="0" r="9" fill="#FCF3CF"/>
        </g>
      </g>

      <!-- Right flower (Yellow) -->
      <g class="flower yellow">
        <path d="M100,500 Q130,300 180,120" stroke="#7DCEA0" stroke-width="4" fill="none" stroke-linecap="round" />
        <path d="M125,340 Q165,300 175,360 Q135,370 125,340" fill="#7DCEA0" />
        <g class="head" transform="translate(180,120) scale(1.8)">
          <circle cx="0" cy="-14" r="12" fill="#FCF3CF"/>
          <circle cx="13" cy="-4" r="12" fill="#FCF3CF"/>
          <circle cx="8" cy="11" r="12" fill="#FCF3CF"/>
          <circle cx="-8" cy="11" r="12" fill="#FCF3CF"/>
          <circle cx="-13" cy="-4" r="12" fill="#FCF3CF"/>
          <circle cx="0" cy="0" r="9" fill="#FADBD8"/>
        </g>
      </g>

      <!-- Center flower (Red) -->
      <g class="flower red">
        <path d="M100,500 Q100,250 100,50" stroke="#7DCEA0" stroke-width="5" fill="none" stroke-linecap="round" />
        <path d="M100,300 Q140,260 150,320 Q120,330 100,300" fill="#7DCEA0" />
        <path d="M100,220 Q60,180 50,240 Q80,250 100,220" fill="#7DCEA0" />
        <g class="head" transform="translate(100,50) scale(1.8)">
          <circle cx="0" cy="-16" r="14" fill="#FADBD8"/>
          <circle cx="15" cy="-5" r="14" fill="#FADBD8"/>
          <circle cx="9" cy="13" r="14" fill="#FADBD8"/>
          <circle cx="-9" cy="13" r="14" fill="#FADBD8"/>
          <circle cx="-15" cy="-5" r="14" fill="#FADBD8"/>
          <circle cx="0" cy="0" r="11" fill="#FCF3CF"/>
        </g>
      </g>
    </svg>
  </div>
</main>
